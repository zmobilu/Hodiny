<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Panel PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system-short-condensed, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none; }

        /* --- ZÁKLADNÝ REŽIM (RÁDIO) --- */
        .clock-section { flex: 1.5; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            border-right: 1px solid #222; padding-top: 3vh; transition: all 0.5s ease-in-out; }
        
        #time { font-size: 26vw; line-height: 0.8; letter-spacing: -4px; display: flex; align-items: baseline; 
                 transform: scaleY(1.1); transform-origin: bottom; }
        .hours-part { font-weight: 600; color: #ffffff; } 
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 5px; } 
        .red-digit { color: #eb0028 !important; } 
        
        .weather-section { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        #weather-temp-mini { font-size: 8.5vw; font-weight: 300; } 
        #weather-icon-mini { font-size: 8.5vw; color: #ffcc00; }

        .ss-only { display: none !important; }

        .buttons-section { flex: 1.1; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; background: #050505; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; padding: 5px; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 70px; }
        .rozhlas { background-color: #007bc4; } 
        .fun { background-color: #b53a65; }
        .rock { background-color: #222222; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 60px; }
        .white-logo { filter: brightness(0) invert(1); }
        .playing { border: 2px solid #fff !important; }

        /* --- REŽIM ŠETRIČA (OPTIMALIZÁCIA iPHONE 8) --- */
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .ss-hide { display: none !important; }
        body.screensaver-mode .ss-only { display: flex !important; }

        body.screensaver-mode .clock-section { 
            flex: 1; border: none; padding: 0;
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            grid-template-rows: 1fr;
            align-items: stretch;
        }

        /* ĽAVÝ STĹPEC */
        .ss-left-col { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-right: 1px solid #1a1a1a; 
        }
        /* Natiahnutý font hodín na výšku */
        body.screensaver-mode #time { 
            font-size: 38vw; 
            margin-bottom: 2vh;
            transform: scaleY(1.3); /* Natiahnutie na výšku */
            transform-origin: center;
        }
        
        #date-block { 
            display: flex; align-items: center; gap: 20px; 
            margin-top: 2vh; 
        }
        .ss-date { font-size: 10vw; font-weight: 300; color: #fff; }
        .ss-moon { font-size: 7vw; color: #aaa; }

        /* PRAVÝ STĹPEC */
        .ss-right-col { 
            display: flex; flex-direction: column; justify-content: space-around; 
            align-items: center; background: #000; padding: 5vh 0;
        }
        .meteo-icon-large { font-size: 18vw; color: #ffcc00; margin-bottom: -5px; }
        
        .temp-group { text-align: center; width: 100%; }
        .temp-label { font-size: 3vw; text-transform: uppercase; color: #444; letter-spacing: 2px; font-weight: 600; }
        .temp-val { font-size: 12vw; font-weight: 300; line-height: 0.9; margin: 5px 0; }
        .temp-hum { font-size: 5vw; color: #777; font-weight: 200; }

        #outdoor-label { color: #ffcc00; } /* Vonku pri ikone predpovede */
        #indoor-label { color: #87CEEB; }

        #spotify-links-container, .bt-mini-link { display: none !important; }
    </style>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="clock-section">
        <!-- ĽAVÁ ČASŤ -->
        <div class="ss-left-col">
            <div id="time">
                <span id="h-part" class="hours-part">0</span>
                <span id="m-part" class="minutes-part">00</span>
            </div>
            <div id="date-block" class="ss-only">
                <span id="date-display" class="ss-date">--.--.</span>
                <i id="moon-icon" class="fas fa-moon ss-moon"></i>
            </div>
        </div>

        <!-- PRAVÁ ČASŤ (Vymenené poradie Vonku/Vnútri) -->
        <div class="ss-right-col ss-only">
            <div class="temp-group" style="margin-bottom: 20px;">
                <i id="weather-icon-main" class="fas fa-cloud-sun meteo-icon-large"></i>
                <div class="temp-label" id="outdoor-label">Zajtra Vonku</div>
                <div class="temp-val" id="outdoor-temp">--°C</div>
                <div class="temp-hum" id="outdoor-hum">--%</div>
            </div>

            <div class="temp-group">
                <div class="temp-label" id="indoor-label">Vnútri</div>
                <div class="temp-val" id="indoor-temp">--°C</div>
                <div class="temp-hum" id="indoor-hum">--%</div>
            </div>
        </div>

        <!-- Rádio režim počasie (Aktuálne) -->
        <div class="weather-section ss-hide" id="radio-weather">
            <i id="weather-icon-mini" class="fas fa-sun"></i>
            <span id="weather-temp-mini">--°C</span>
        </div>
    </div>

    <div class="buttons-section">
        <button onclick="stopRadio()" class="btn vypni"><i class="fa-solid fa-power-off"></i></button>
        <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn rozhlas">
            <div style="display: flex; align-items: center; font-size: 38px; font-weight: 800;">SRo</div>
        </button>
        <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun">
            <img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg" alt="Fun">
        </button>
        <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock">
            <img src="https://radiorock.sk/logo.svg" alt="Rock" class="white-logo">
        </button>
        <button onclick="showSpotify()" class="btn spotify"><i class="fa-brands fa-spotify"></i></button>
    </div>

    <script>
    const SHELLY_IP = '192.168.1.50'; 

    function updateClock() {
        const now = new Date();
        let h = String(now.getHours()).padStart(2, '0');
        let m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('h-part').innerHTML = h.replace(/1/g, '<span class="red-digit">1</span>');
        document.getElementById('m-part').textContent = m;
        document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
        updateMoonPhase(now);
    }
    setInterval(updateClock, 1000); updateClock();

    function updateMoonPhase(date) {
        const lp = 2551443; 
        const new_moon = new Date(1970, 0, 7, 20, 35, 0);
        const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
        const res = Math.floor(phase / (24 * 3600));
        let icon = "fa-moon";
        if (res < 2) icon = "fa-circle"; 
        else if (res < 14) icon = "fa-circle-half-stroke"; 
        else if (res < 17) icon = "fa-solid fa-circle"; 
        document.getElementById('moon-icon').className = `fas ${icon} ss-moon`;
    }

    async function updateWeather() {
        try {
            // Pridané denné predpovede (daily) do API volania
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,relative_humidity_2m,weather_code&daily=weather_code&timezone=Europe%2FBratislava`);
            const d = await r.json();
            
            // Mini počasie (Aktuálne)
            const curTemp = Math.round(d.current.temperature_2m);
            document.getElementById('weather-temp-mini').textContent = curTemp + '°C';
            
            // Vonkajšie údaje (Aktuálne)
            document.getElementById('outdoor-temp').textContent = curTemp + '°C';
            document.getElementById('outdoor-hum').textContent = Math.round(d.current.relative_humidity_2m) + '%';
            
            const codes = { 0: 'fa-sun', 1: 'fa-cloud-sun', 3: 'fa-cloud', 61: 'fa-cloud-rain', 95: 'fa-bolt' };
            
            // Ikona v rádio režime (Aktuálna)
            document.getElementById('weather-icon-mini').className = 'fas ' + (codes[d.current.weather_code] || 'fa-cloud');
            
            // HLAVNÁ IKONA (PREDPOVEĎ NA ZAJTRA - index 1)
            const forecastCode = d.daily.weather_code[1];
            document.getElementById('weather-icon-main').className = 'fas ' + (codes[forecastCode] || 'fa-cloud') + ' meteo-icon-large';
            
        } catch (e) {}
    }
    updateWeather(); setInterval(updateWeather, 1800000);

    async function updateIndoor() {
        try {
            const r = await fetch(`http://${SHELLY_IP}/rpc/HTSensor.GetStatus`);
            const d = await r.json();
            document.getElementById('indoor-temp').textContent = Math.round(d.tC) + '°C';
            document.getElementById('indoor-hum').textContent = Math.round(d.rh) + '%';
        } catch (e) { }
    }
    updateIndoor(); setInterval(updateIndoor, 300000);

    const audio = document.getElementById('audioPlayer');
    function playRadio(url, element, type) {
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        audio.src = url; audio.play();
        element.classList.add('playing');
        resetIdleTimer();
    }
    function stopRadio() {
        audio.pause(); audio.src = "";
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        resetIdleTimer();
    }

    let idleTimer;
    function resetIdleTimer() {
        document.body.classList.remove('screensaver-mode');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => document.body.classList.add('screensaver-mode'), 20000);
    }
    document.addEventListener('touchstart', resetIdleTimer);
    resetIdleTimer();
</script>
</body>
</html>
