<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meteostanica iPhone 8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* ZÁKLADNÁ FIXÁCIA NA ROZLÍŠENIE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            width: 1334px; height: 750px; 
            background-color: #000; overflow: hidden; 
            position: fixed; top: 0; left: 0; 
        }
        body { 
            display: flex; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        /* --- ĽAVÝ PANEL (HODINY A INFO) --- */
        .left-panel { 
            flex: 0 0 880px; height: 750px; 
            display: flex; flex-direction: column; 
            padding: 0 0 30px 40px; 
            border-right: 1px solid #222;
        }

        #time { 
            font-size: 440px; line-height: 0.8; 
            display: flex; align-items: baseline; 
            transform: scaleY(1.35); transform-origin: left top;
            letter-spacing: -15px; margin-top: 60px;
            height: 480px;
        }
        .hours-part { font-weight: 600; }
        .minutes-part { font-weight: 200; margin-left: 10px; }
        .red-digit { color: #eb0028 !important; }

        .separator { 
            width: 820px; height: 6px; 
            background-color: #444; margin: 10px 0 40px 0;
            border-radius: 3px;
        }

        .bottom-row { 
            display: flex; align-items: center; 
            width: 820px; height: 120px; gap: 20px;
        }
        #moon-icon { font-size: 90px; color: #555; width: 100px; text-align: center; }
        .date-text { font-size: 160px; font-weight: 300; letter-spacing: -5px; }
        
        .wind-box { display: flex; align-items: center; gap: 10px; margin-left: 20px; color: #888; }
        #wind-arrow { font-size: 55px; transition: transform 1s ease; }
        .wind-val { font-size: 70px; font-weight: 300; }
        .wind-unit { font-size: 24px; margin-top: 25px; }

        #nameday { 
            margin-left: auto; font-size: 60px; font-weight: 500; 
            color: #00FF00; text-transform: uppercase; 
        }

        /* --- PRAVÝ PANEL (POČASIE) --- */
        .right-panel { 
            flex: 0 0 454px; height: 750px; 
            display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px 20px 40px 10px;
        }

        .current-weather { text-align: center; }
        #main-icon { font-size: 210px; color: #ffcc00; margin-bottom: 10px; }
        #main-temp { font-size: 200px; font-weight: 300; color: #98FB98; line-height: 1; }
        
        .extra-info { display: flex; justify-content: center; gap: 35px; margin-top: 10px; }
        #apparent-temp { font-size: 90px; font-weight: 300; }
        #humidity { font-size: 90px; font-weight: 200; color: #888; }

        .forecast-box { border-top: 1px solid #333; padding-top: 20px; }
        .forecast-header { display: flex; justify-content: space-around; font-size: 24px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .forecast-row { display: flex; justify-content: space-around; text-align: center; }
        .fc-icon { font-size: 75px; margin-bottom: 10px; }
        .fc-temp { font-size: 50px; font-weight: 300; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="time">
            <span id="h-part" class="hours-part">--</span>
            <span id="m-part" class="minutes-part">--</span>
        </div>
        <div class="separator"></div>
        <div class="bottom-row">
            <i id="moon-icon" class="fas fa-circle"></i>
            <span id="date-display" class="date-text">--.--.</span>
            <div class="wind-box">
                <i id="wind-arrow" class="fas fa-location-arrow"></i>
                <span id="wind-speed" class="wind-val">--</span>
                <span class="wind-unit">km/h</span>
            </div>
            <span id="nameday">---</span>
        </div>
    </div>

    <div class="right-panel">
        <div class="current-weather">
            <i id="main-icon" class="fas fa-sun"></i>
            <div id="main-temp">--°C</div>
            <div class="extra-info">
                <span id="apparent-temp">--°</span>
                <span id="humidity">--%</span>
            </div>
        </div>

        <div class="forecast-box">
            <div class="forecast-header">
                <span>Dnes</span>
                <span>Zajtra</span>
            </div>
            <div class="forecast-row">
                <div>
                    <i id="fc0-icon" class="fas fa-cloud fc-icon"></i>
                    <div id="fc0-temp" class="fc-temp">-- / --</div>
                </div>
                <div>
                    <i id="fc1-icon" class="fas fa-cloud fc-icon"></i>
                    <div id="fc1-temp" class="fc-temp">-- / --</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEATHER_ICONS = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
        const WEATHER_COLORS = { 0: '#ffcc00', 1: '#ffdb58', 2: '#aaa', 3: '#888', 51: '#4dabff', 61: '#007bff', 95: '#ffeb3b' };

        // Spektrum farieb pre teplotu
        function getTempColor(t) {
            if (t < 0) return '#00bfff'; // mráz
            if (t < 12) return '#87CEEB'; // chladno
            if (t < 23) return '#98FB98'; // ideálne (zelená)
            if (t < 30) return '#ffa500'; // teplo
            return '#ff4500'; // horúco
        }

        // Výpočet fázy mesiaca
        function updateMoonIcon(date) {
            const lp = 2551443; 
            const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const days = Math.floor(phase / (24 * 3600));
            let icon = "fa-circle"; // Spln (predvolené)
            
            if (days < 2 || days > 28) icon = "fa-circle-notch"; // Nov
            else if (days < 14) icon = "fa-circle-half-stroke"; // Dorastá
            else if (days > 16) icon = "fa-solid fa-circle"; // Spln / Ubúda
            
            document.getElementById('moon-icon').className = `fas ${icon}`;
        }

        async function updateNameday() {
            try {
                const r = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await r.text();
                const now = new Date();
                const target = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const lines = text.split('\n');
                for (let line of lines) {
                    if (line.includes(target)) {
                        document.getElementById('nameday').textContent = line.split(/[;,]/).pop().trim();
                        break;
                    }
                }
            } catch (e) {}
        }

        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('h-part').innerHTML = (h[0] === '1') ? `<span class="red-digit">1</span>${h[1]}` : h;
            document.getElementById('m-part').textContent = m;
            document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
            
            updateMoonIcon(now);
        }

        async function updateWeather() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
                const d = await r.json();

                const temp = Math.round(d.current.temperature_2m);
                const appTemp = Math.round(d.current.apparent_temperature);
                
                // Hlavná teplota
                const tempEl = document.getElementById('main-temp');
                tempEl.textContent = temp + '°C';
                tempEl.style.color = getTempColor(temp);

                // Pocitová teplota
                const appEl = document.getElementById('apparent-temp');
                appEl.textContent = appTemp + '°';
                appEl.style.color = getTempColor(appTemp);

                document.getElementById('humidity').textContent = Math.round(d.current.relative_humidity_2m) + '%';
                
                // Vietor
                document.getElementById('wind-speed').textContent = Math.round(d.current.wind_speed_10m);
                document.getElementById('wind-arrow').style.transform = `rotate(${d.current.wind_direction_10m - 45}deg)`;

                // Ikona
                const iconCode = d.current.weather_code;
                const iconEl = document.getElementById('main-icon');
                iconEl.className = `fas ${WEATHER_ICONS[iconCode] || 'fa-cloud'}`;
                iconEl.style.color = WEATHER_COLORS[iconCode] || '#fff';

                // Predpoveď
                for (let i = 0; i <= 1; i++) {
                    const max = Math.round(d.daily.temperature_2m_max[i]);
                    const min = Math.round(d.daily.temperature_2m_min[i]);
                    const code = d.daily.weather_code[i];
                    document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${max}°</span> / <span style="color:#666">${min}°</span>`;
                    document.getElementById(`fc${i}-icon`).className = `fas ${WEATHER_ICONS[code] || 'fa-cloud'}`;
                    document.getElementById(`fc${i}-icon`).style.color = WEATHER_COLORS[code] || '#888';
                }
            } catch (e) {}
        }

        // Štart
        updateClock(); updateWeather(); updateNameday();
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000);
    </script>
</body>
</html>
