<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meteostanica iPhone 8 - Centered Clock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* --- DEFINÍCIA ROZLÍŠENIA --- */
        :root {
            --w: 667px;
            --h: 375px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: var(--w); 
            height: var(--h); 
            background-color: #000; 
            overflow: hidden; 
            position: fixed;
            top: 0; left: 0;
        }

        body { 
            display: flex; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; 
            user-select: none;
        }

        /* --- ĽAVÝ PANEL --- */
        .left-panel { 
            width: 66%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding-bottom: calc(var(--h) * 0.04);
            border-right: 1px solid #222;
        }

        #time { 
            font-size: calc(var(--h) * 0.65); 
            line-height: 0.8; 
            display: flex; 
            /* CENTROVANIE NA STRED */
            justify-content: center; 
            align-items: flex-start; 
            
            transform: scaleY(1.3); 
            transform-origin: center top; /* Zmena origin na stred */
            margin-top: -1%;
            height: calc(var(--h) * 0.72); 
            letter-spacing: calc(var(--w) * -0.02);
            overflow: visible;
            width: 100%;
        }
        .hours-part { font-weight: 600; }
        .minutes-part { font-weight: 200; margin-left: calc(var(--w) * 0.01); }
        .red-digit { color: #eb0028 !important; }

        .separator { 
            width: 90%; 
            height: calc(var(--h) * 0.008); 
            background-color: #444; 
            margin: 0 auto calc(var(--h) * 0.04) auto; /* Vycentrovanie separátora */
            border-radius: 5px;
        }

        .bottom-row { 
            display: flex; 
            align-items: center; 
            width: 100%; 
            height: calc(var(--h) * 0.18); 
            gap: calc(var(--w) * 0.02);
            padding: 0 5%; /* Mierne bočné odsadenie pre info riadok */
        }
        #moon-icon { font-size: calc(var(--h) * 0.12); color: #555; width: calc(var(--w) * 0.08); text-align: center; }
        .date-text { font-size: calc(var(--h) * 0.22); font-weight: 300; letter-spacing: -1px; }
        
        .wind-box { display: flex; align-items: center; gap: 5px; color: #888; }
        #wind-arrow { font-size: calc(var(--h) * 0.08); transition: transform 1s ease; }
        .wind-val { font-size: calc(var(--h) * 0.1); font-weight: 300; }
        .wind-unit { font-size: calc(var(--h) * 0.04); margin-top: calc(var(--h) * 0.03); }

        #nameday { 
            margin-left: auto; 
            font-size: calc(var(--h) * 0.08); 
            font-weight: 500; 
            color: #00FF00; 
            text-transform: uppercase; 
        }

        /* --- PRAVÝ PANEL --- */
        .right-panel { 
            width: 34%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: calc(var(--h) * 0.02) calc(var(--w) * 0.02);
        }

        .current-weather { text-align: center; }
        #main-icon { 
            font-size: calc(var(--h) * 0.28); 
            color: #ffcc00; 
            margin-bottom: calc(var(--h) * -0.01); 
        }
        #main-temp { font-size: calc(var(--h) * 0.25); font-weight: 300; color: #98FB98; line-height: 1; }
        
        .extra-info { display: flex; justify-content: center; gap: calc(var(--w) * 0.04); margin-top: 5px; }
        #apparent-temp { font-size: calc(var(--h) * 0.1); font-weight: 300; }
        #humidity { font-size: calc(var(--h) * 0.1); font-weight: 200; color: #888; }

        .forecast-box { border-top: 1px solid #333; padding-top: calc(var(--h) * 0.02); margin-top: auto; }
        .forecast-header { 
    display: flex; 
    justify-content: space-around; 
    /* Zväčšené z 0.035 na 0.05 */
    font-size: calc(var(--h) * 0.035); 
    color: #666; 
    text-transform: uppercase; 
    margin-bottom: calc(var(--h) * 0.01); 
    /* Voliteľné: mierne natiahnutie do výšky */
    transform: scaleY(1.1);
}        .forecast-row { display: flex; justify-content: space-around; text-align: center; }
        .fc-icon { 
    /* Mierne zväčšenie ikony z 0.09 na 0.11 */
    font-size: calc(var(--h) * 0.10); 
    margin-bottom: 2px; 
}
        .fc-temp { 
    /* Zväčšené z 0.06 na 0.09 */
    font-size: calc(var(--h) * 0.09); 
    font-weight: 300;
    display: block;
    /* Natiahnutie fontu do výšky (ako na hodinách) */
    transform: scaleY(1.1);
    margin-top: calc(var(--h) * 0.01);
}
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="time">
            <span id="h-part" class="hours-part">--</span>
            <span id="m-part" class="minutes-part">--</span>
        </div>
        <div class="separator"></div>
        <div class="bottom-row">
            <i id="moon-icon" class="fas fa-circle"></i>
            <span id="date-display" class="date-text">--.--.</span>
            <div class="wind-box">
                <i id="wind-arrow" class="fas fa-location-arrow"></i>
                <span id="wind-speed" class="wind-val">--</span>
                <span class="wind-unit">km/h</span>
            </div>
            <span id="nameday">---</span>
        </div>
    </div>

    <div class="right-panel">
        <div class="current-weather">
            <i id="main-icon" class="fas fa-sun"></i>
            <div id="main-temp">--°C</div>
            <div class="extra-info">
                <span id="apparent-temp">--°</span>
                <span id="humidity">--%</span>
            </div>
        </div>
        <div class="forecast-box">
            <div class="forecast-header">
                <span>Dnes</span>
                <span>Zajtra</span>
            </div>
            <div class="forecast-row">
                <div>
                    <i id="fc0-icon" class="fas fa-cloud fc-icon"></i>
                    <div id="fc0-temp" class="fc-temp">-- / --</div>
                </div>
                <div>
                    <i id="fc1-icon" class="fas fa-cloud fc-icon"></i>
                    <div id="fc1-temp" class="fc-temp">-- / --</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEATHER_ICONS = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
        const WEATHER_COLORS = { 0: '#ffcc00', 1: '#ffdb58', 2: '#aaa', 3: '#888', 51: '#4dabff', 61: '#007bff', 95: '#ffeb3b' };

        function getTempColor(t) {
            if (t < 0) return '#00bfff';
            if (t < 12) return '#87CEEB';
            if (t < 23) return '#98FB98';
            if (t < 30) return '#ffa500';
            return '#ff4500';
        }

        function updateMoonIcon(date) {
            const lp = 2551443; 
            const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const days = Math.floor(phase / (24 * 3600));
            let icon = "fa-circle";
            if (days < 2 || days > 28) icon = "fa-circle-notch";
            else if (days < 14) icon = "fa-circle-half-stroke";
            else if (days > 16) icon = "fa-solid fa-circle";
            document.getElementById('moon-icon').className = `fas ${icon}`;
        }

        async function updateNameday() {
            try {
                const r = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await r.text();
                const now = new Date();
                const target = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const lines = text.split('\n');
                for (let line of lines) {
                    if (line.includes(target)) {
                        document.getElementById('nameday').textContent = line.split(/[;,]/).pop().trim();
                        break;
                    }
                }
            } catch (e) {}
        }

        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('h-part').innerHTML = (h[0] === '1') ? `<span class="red-digit">1</span>${h[1]}` : h;
            document.getElementById('m-part').textContent = m;
            document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
            updateMoonIcon(now);
        }

        async function updateWeather() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
                const d = await r.json();
                const temp = Math.round(d.current.temperature_2m);
                const appTemp = Math.round(d.current.apparent_temperature);
                const tempEl = document.getElementById('main-temp');
                tempEl.textContent = temp + '°C';
                tempEl.style.color = getTempColor(temp);
                const appEl = document.getElementById('apparent-temp');
                appEl.textContent = appTemp + '°';
                appEl.style.color = getTempColor(appTemp);
                document.getElementById('humidity').textContent = Math.round(d.current.relative_humidity_2m) + '%';
                document.getElementById('wind-speed').textContent = Math.round(d.current.wind_speed_10m);
                document.getElementById('wind-arrow').style.transform = `rotate(${d.current.wind_direction_10m - 45}deg)`;
                const iconCode = d.current.weather_code;
                const iconEl = document.getElementById('main-icon');
                iconEl.className = `fas ${WEATHER_ICONS[iconCode] || 'fa-cloud'}`;
                iconEl.style.color = WEATHER_COLORS[iconCode] || '#fff';
                for (let i = 0; i <= 1; i++) {
                    const max = Math.round(d.daily.temperature_2m_max[i]);
                    const min = Math.round(d.daily.temperature_2m_min[i]);
                    const code = d.daily.weather_code[i];
                    document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${max}°</span> / <span style="color:#666">${min}°</span>`;
                    document.getElementById(`fc${i}-icon`).className = `fas ${WEATHER_ICONS[code] || 'fa-cloud'}`;
                    document.getElementById(`fc${i}-icon`).style.color = WEATHER_COLORS[code] || '#888';
                }
            } catch (e) {}
        }

        updateClock(); updateWeather(); updateNameday();
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000);
    </script>
</body>
</html>
