<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moje_radio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* FIXNÉ NASTAVENIE PRE IPHONE 8 (1334x750) */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { 
            width: 1334px; 
            height: 750px; 
            background-color: #000; 
            overflow: hidden; 
            position: fixed; 
            top: 0; left: 0;
        }

        body { 
            display: flex; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none; 
            user-select: none;
        }

        /* --- ROZDELENIE STRÁN (60/40) --- */
        .clock-section { 
            flex: 0 0 800px; 
            height: 750px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-right: 1px solid #1a1a1a; 
            position: relative;
        }

        .buttons-section { 
            flex: 0 0 534px; 
            height: 750px;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 210px 255px 255px; 
            gap: 12px; 
            padding: 12px; 
            background: #000; 
        }

        /* --- HODINY (STRETCH VZHĽAD) --- */
        #time { 
            font-size: 420px; 
            line-height: 0.8; 
            display: flex; 
            align-items: baseline; 
            transform: scaleY(1.30); 
            transform-origin: center;
            letter-spacing: -12px;
        }
        .hours-part { font-weight: 600; color: #ffffff; }
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 10px; }
        .red-digit { color: #eb0028 !important; }

        #weather-temp-mini { font-size: 80px; font-weight: 300; margin-top: 40px; }

        /* --- SPOTIFY PANEL (VYSKAKOVACÍ) --- */
        #spotify-links-container { 
            display: none; 
            position: absolute;
            bottom: 40px;
            width: 85%; 
            background: #0a0a0a; 
            border-radius: 25px; 
            padding: 20px; 
            border: 2px solid #198c47; 
            z-index: 10;
        }
        .spotify-grid { display: flex; justify-content: space-around; align-items: center; }
        .spot-link { background: none; border: none; color: white; font-size: 35px; font-weight: 500; cursor: pointer; }

        /* --- TLAČIDLÁ --- */
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; color: white; border-radius: 40px; }
        .vypni { background-color: #2a2a2a; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 100px; }
        .sro { background-color: #007bc4; font-size: 70px; font-weight: 800; }
        .fun { background-color: #b53a65; }
        .rock { background-color: #222; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 110px; }
        .playing { border: 4px solid #fff !important; }
        .btn img { height: 45%; max-width: 80%; object-fit: contain; }

        /* --- ŠETRIČ MOD --- */
        .ss-only { display: none !important; }
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .ss-hide { display: none !important; }
        body.screensaver-mode .ss-only { display: flex !important; }
        body.screensaver-mode .clock-section { flex: 0 0 1334px; display: grid; grid-template-columns: 880px 454px; border: none; }

        .ss-left-col { display: flex; flex-direction: column; justify-content: space-between; padding: 40px 0 60px 60px; border-right: 1px solid #111; height: 100%; }
        .ss-date { font-size: 180px; font-weight: 300; }
        .ss-day { font-size: 60px; color: #87CEEB; text-transform: uppercase; margin-left: 20px; }
        .ss-moon { font-size: 100px; color: #333; }

        .ss-right-col { display: flex; flex-direction: column; justify-content: space-between; padding: 40px 30px 60px 0; height: 100%; }
        .meteo-icon-large { font-size: 200px; color: #ffcc00; }
        .temp-val { font-size: 180px; font-weight: 300; color: #98FB98; text-align: center; }
        .hum-val { font-size: 80px; color: #aaa; opacity: 0.5; }

        #mini-forecast-strip { display: flex; justify-content: space-around; border-top: 1px solid #222; padding-top: 20px; }
        .mini-icon { font-size: 75px; margin: 5px 0; }
        .mini-temp { font-size: 50px; }
    </style>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="clock-section">
        <div class="ss-left-col">
            <div id="time">
                <span id="h-part" class="hours-part">00</span>
                <span id="m-part" class="minutes-part">00</span>
            </div>
            
            <div id="weather-temp-mini" class="ss-hide">--°C</div>

            <div id="spotify-links-container" class="ss-hide">
                <div class="spotify-grid">
                    <button onclick="openSpotify('67q2IYkPShkkWCbV14rRil')" class="spot-link">Jaja🎵</button>
                    <button onclick="openSpotify('63bq913mo2Dv0KIOnnUzam')" class="spot-link">🎸</button>
                    <button onclick="openSpotify('2xLrXn0HleL3pJvnRWnRcJ')" class="spot-link">🔥</button>
                    <button onclick="openSpotify('search')" class="spot-link"><i class="fa fa-search"></i></button>
                </div>
            </div>

            <div id="date-block" class="ss-only" style="display:flex; align-items:center; gap:30px;">
                <i id="moon-icon" class="fas fa-circle ss-moon"></i>
                <div style="display: flex; align-items: baseline;">
                    <span id="date-display" class="ss-date">--.--.</span>
                    <span id="day-display" class="ss-day">---</span>
                </div>
            </div>
        </div>

        <div class="ss-right-col ss-only">
            <div style="text-align: center;">
                <i id="weather-icon-main" class="fas fa-sun meteo-icon-large"></i>
                <div class="temp-val" id="outdoor-temp">--°C</div>
                <div style="display: flex; justify-content: center; gap: 30px;">
                    <span id="apparent-temp" class="hum-val">--°</span>
                    <span id="outdoor-hum" class="hum-val">--%</span>
                </div>
            </div>
            <div id="mini-forecast-strip">
                <div style="text-align:center;"><span style="font-size:22px; color:#aaa;">DNES</span><br><i id="fc0-icon" class="fas fa-cloud mini-icon"></i><br><span id="fc0-temp" class="mini-temp">--</span></div>
                <div style="text-align:center;"><span style="font-size:22px; color:#aaa;">ZAJTRA</span><br><i id="fc1-icon" class="fas fa-cloud mini-icon"></i><br><span id="fc1-temp" class="mini-temp">--</span></div>
            </div>
        </div>
    </div>

    <div class="buttons-section">
        <button onclick="stopRadio()" class="btn vypni"><i class="fa-solid fa-power-off"></i></button>
        <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn sro">SRo</button>
        <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun"><img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg"></button>
        <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock"><img src="https://radiorock.sk/logo.svg" style="filter: brightness(0) invert(1);"></button>
        <button onclick="showSpotify()" class="btn spotify"><i class="fa-brands fa-spotify"></i></button>
    </div>

    <script>
    const VOLUME_MAP = { 'slovensko': 0.4, 'fun': 1.0, 'rock': 0.5 };
    const WEATHER_CODES = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
    const WEATHER_COLORS = { 0: '#ffcc00', 1: '#ffdb58', 2: '#aaa', 3: '#888', 45: '#777', 51: '#4dabff', 61: '#007bff', 71: '#fff', 95: '#ffeb3b' };
    
    function getTempColor(t) {
        if (t < 0) return '#00bfff'; if (t < 10) return '#87CEEB';
        if (t < 22) return '#98FB98'; if (t < 28) return '#ffa500'; return '#ff4500';
    }

    let dnesneMeno = ""; 
    async function updateNameday() {
        try {
            const r = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
            const t = await r.text();
            const now = new Date();
            const target = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            for (let l of t.split('\n')) { if (l.includes(target)) { dnesneMeno = l.split(/[;,]/).pop().trim(); break; } }
        } catch (e) {}
    }

    function updateClock() {
        const now = new Date();
        let h = String(now.getHours()).padStart(2, '0');
        let m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('h-part').innerHTML = (h[0] === '1') ? `<span class="red-digit">1</span>${h.substring(1)}` : h;
        document.getElementById('m-part').textContent = m;
        document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
        document.getElementById('day-display').textContent = dnesneMeno;
        const phase = ((now.getTime() - new Date(1970, 0, 7, 20, 35, 0).getTime()) / 1000) % 2551443;
        const res = Math.floor(phase / (24 * 3600));
        document.getElementById('moon-icon').className = `fas ${res < 2 ? "fa-circle" : (res < 14 ? "fa-circle-half-stroke" : "fa-solid fa-circle")} ss-moon`;
    }

    async function updateWeather() {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
            const d = await r.json();
            const temp = Math.round(d.current.temperature_2m);
            document.getElementById('weather-temp-mini').textContent = temp + '°C';
            document.getElementById('weather-temp-mini').style.color = getTempColor(temp);
            document.getElementById('outdoor-temp').textContent = temp + '°C';
            document.getElementById('outdoor-temp').style.color = getTempColor(temp);
            document.getElementById('apparent-temp').textContent = Math.round(d.current.apparent_temperature) + '°';
            document.getElementById('outdoor-hum').textContent = Math.round(d.current.relative_humidity_2m) + '%';
            document.getElementById('weather-icon-main').className = `fas ${WEATHER_CODES[d.current.weather_code] || 'fa-cloud'} meteo-icon-large`;
            document.getElementById('weather-icon-main').style.color = WEATHER_COLORS[d.current.weather_code];
            for (let i = 0; i <= 1; i++) {
                const max = d.daily.temperature_2m_max[i];
                document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${Math.round(max)}°</span> <span style="color:#aaa; font-size:0.7em">/ ${Math.round(d.daily.temperature_2m_min[i])}°</span>`;
                document.getElementById(`fc${i}-icon`).className = `fas ${WEATHER_CODES[d.daily.weather_code[i]]} mini-icon`;
                document.getElementById(`fc${i}-icon`).style.color = WEATHER_COLORS[d.daily.weather_code[i]];
            }
        } catch (e) {}
    }

    updateNameday(); updateClock(); updateWeather();
    setInterval(updateClock, 1000); setInterval(updateWeather, 600000);

    let idleTimer;
    function resetIdleTimer() {
        document.body.classList.remove('screensaver-mode');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            document.body.classList.add('screensaver-mode');
            document.getElementById('spotify-links-container').style.display = 'none';
        }, 20000);
    }
    document.addEventListener('touchstart', resetIdleTimer);
    resetIdleTimer();

    const audio = document.getElementById('audioPlayer');
    function playRadio(url, element, type) {
        document.getElementById('spotify-links-container').style.display = 'none';
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        audio.volume = VOLUME_MAP[type] || 1.0; audio.src = url; audio.play();
        element.classList.add('playing');
    }
    function stopRadio() {
        audio.pause(); audio.src = "";
        document.getElementById('spotify-links-container').style.display = 'none';
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
    }
    function showSpotify() {
        const panel = document.getElementById('spotify-links-container');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        resetIdleTimer();
    }
    function openSpotify(id) {
        let url = id === 'search' ? "spotify:search" : `spotify:playlist:${id}`;
        window.location.href = url;
    }
    </script>
</body>
</html>
