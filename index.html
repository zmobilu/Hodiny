<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hodiny-testovací modul</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system-short-condensed, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none; }

        /* --- REŽIM RÁDIO (OVLÁDANIE) --- */
        .clock-section { flex: 1.5; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-right: 1px solid #222; transition: all 0.5s ease-in-out; position: relative; }
        
        #time { font-size: 24vw; line-height: 0.8; letter-spacing: -4px; display: flex; align-items: baseline; 
              transform: scaleY(1.05); transform-origin: center; }
        .hours-part { font-weight: 600; color: #ffffff; } 
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 5px; } 
        .red-digit { color: #eb0028 !important; } 
        
        #weather-temp-mini { font-size: 5vw; font-weight: 300; margin-top: 10px; color: #aaa; } 
        .ss-only { display: none !important; }

        .buttons-section { flex: 1.1; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; background: #050505; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; text-decoration: none; }
        .btn i { font-size: 40px; margin-bottom: 5px; color: #fff; }
        .btn span { font-size: 14px; text-transform: uppercase; font-weight: 500; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 65px; }
        .playing { border: 2px solid #fff !important; background: #222 !important; }

        /* --- ŠETRIČ (METEOSTANICA) --- */
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .ss-hide { display: none !important; }
        body.screensaver-mode .ss-only { display: flex !important; }
        
        body.screensaver-mode .clock-section { 
            flex: 1; border: none; display: grid; 
            grid-template-columns: 1.25fr 0.75fr; align-items: stretch; 
        }

        /* ĽAVÁ STRANA - Hodiny a Dátum */
        .ss-left-col { display: flex; flex-direction: column; justify-content: flex-start !important; align-items: center; border-right: 1px solid #1a1a1a; padding: 0; }
        
        body.screensaver-mode #time { 
            font-size: 32vw; transform: scaleY(1.30); letter-spacing: -1vw; 
            margin-top: 8vh; /* Stiahne hodiny nižšie od horného okraja */
        }
        
        #date-block { 
            display: flex; align-items: center; justify-content: flex-start; 
            width: 90%; gap: 15px; margin-top: auto; /* Odtlačí dátum na spodok */
            margin-bottom: 3.5vh; padding-left: 4vw; 
        }

        .ss-moon { font-size: 8vw; color: #333; } 
        .ss-date-wrapper { display: flex; flex-direction: column; justify-content: center; }
        .ss-date { font-size: 14vw; font-weight: 300; color: #fff; line-height: 1; }

        .ss-day-container { display: flex; flex-direction: column; gap: 2px; }
        .ss-day { font-size: 4.2vw; font-weight: 400; color: #1db954; text-transform: uppercase; line-height: 1.1; max-width: 38vw; white-space: normal; }
        .ss-holiday { font-size: 3vw; font-weight: 300; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; }

        /* PRAVÁ STRANA - Počasie */
        .ss-right-col { display: flex; flex-direction: column; justify-content: space-between !important; align-items: center; background: #000; padding: 0; }
        .current-weather-group { text-align: center; margin-top: 4vh; }
        .meteo-icon-large { font-size: 15vw; margin-bottom: 5px; }
        .temp-val { font-size: 14vw; font-weight: 300; line-height: 0.9; color: #fff; }
        
        .sub-info-row { display: flex; justify-content: center; gap: 14px; width: 100%; transform: scaleX(1.2) scaleY(0.8); transform-origin: center; }
        .hum-val { font-size: 6.5vw; font-weight: 200; color: #aaa; letter-spacing: 1px; opacity: 0.8; }

        /* PREDPOVEĎ - MAXI VERZIA BEZ TEXTU */
        #mini-forecast-strip { 
            display: flex; flex-direction: row !important; justify-content: space-around; align-items: center;
            width: 100%; border-top: 1px solid #222; padding: 1.5vh 0; margin-bottom: 3.5vh; 
        }
        .mini-item { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .mini-day { display: none; } /* Odstránenie nápisov Dnes/Zajtra */
        .mini-icon { font-size: 13vw !important; margin: 5px 0; line-height: 1; }
        .mini-temp { font-size: 6.5vw; font-weight: 500; color: #fff; line-height: 1; }
    </style>
</head>
<body class="screensaver-mode">

    <audio id="audioPlayer"></audio>

    <div class="clock-section">
        <div class="ss-left-col ss-only">
            <div id="time">
                <span id="h-part" class="hours-part">00</span>
                <span id="m-part" class="minutes-part">00</span>
            </div>
            
            <div id="date-block">
                <i id="moon-icon" class="fas fa-circle ss-moon"></i>
                <div class="ss-date-wrapper">
                    <span id="date-display" class="ss-date">--.--.</span>
                    <div class="ss-day-container">
                        <span id="day-display" class="ss-day">---</span>
                        <span id="holiday-display" class="ss-holiday"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ss-right-col ss-only">
            <div class="current-weather-group">
                <i id="weather-icon-main" class="fas fa-sun meteo-icon-large"></i>
                <div id="outdoor-temp" class="temp-val">--°C</div>
                <div class="sub-info-row">
                    <span id="apparent-temp" class="hum-val">--°</span>
                    <span id="outdoor-hum" class="hum-val">--%</span>
                </div>
            </div>

            <div id="mini-forecast-strip">
                <div class="mini-item">
                    <i id="fc0-icon" class="fas fa-sun mini-icon"></i>
                    <div id="fc0-temp" class="mini-temp">--° / --°</div>
                </div>
                <div class="mini-item">
                    <i id="fc1-icon" class="fas fa-cloud-sun mini-icon"></i>
                    <div id="fc1-temp" class="mini-temp">--° / --°</div>
                </div>
            </div>
        </div>

        <div id="time" class="ss-hide">
            <span id="h-part-radio" class="hours-part">00</span>
            <span id="m-part-radio" class="minutes-part">00</span>
        </div>
        <div id="weather-temp-mini" class="ss-hide">--°C</div>
    </div>

    <div class="buttons-section">
        <button class="btn vypni" onclick="stopRadio()">
            <i class="fas fa-power-off"></i>
        </button>
        <button id="btn-slovensko" class="btn" onclick="playRadio('https://stream.rozhlas.sk/slovensko_128.mp3', this, 'slovensko')">
            <i class="fas fa-radio"></i><span>Slovensko 1</span>
        </button>
        <button id="btn-fun" class="btn" onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')">
            <i class="fas fa-bolt"></i><span>Fun Rádio</span>
        </button>
        <button id="btn-rock" class="btn" onclick="playRadio('https://stream.radiorock.sk/rock128.mp3', this, 'rock')">
            <i class="fas fa-guitar"></i><span>Rádio Rock</span>
        </button>
        <button class="btn spotify" onclick="showSpotify()">
            <i class="fab fa-spotify" style="color: #1db954;"></i><span>Spotify</span>
        </button>
    </div>

    <script>
        const VOLUME_MAP = { 'slovensko': 0.4, 'fun': 1.0, 'rock': 0.5 };
        const WEATHER_CODES = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
        const WEATHER_COLORS = { 0: '#ffcc00', 1: '#ffdb58', 2: '#aaa', 3: '#888', 45: '#777', 51: '#4dabff', 61: '#007bff', 71: '#fff', 95: '#ffeb3b' };
        
        function getTempColor(t) {
            if (t < 0) return '#00bfff';
            if (t < 10) return '#87CEEB';
            if (t < 22) return '#98FB98';
            if (t < 28) return '#ffa500';
            return '#ff4500';
        }

        // LOKÁLNE MENINY PRE MÁJ (iPhone ich nevie stiahnuť z webu kvôly CORS)
        const meninyMaj = {
            1: "Sviatok práce", 2: "Žigmund", 3: "Galina", 4: "Florián", 
            5: "Lesana / Lesia", 6: "Hermína", 7: "Monika", 8: "Ingrida", 
            9: "Roland", 10: "Viktória", 11: "Blažena", 12: "Pankrác",
            13: "Servác", 14: "Bonifác", 15: "Žofia", 16: "Svetozár", 
            17: "Gizela", 18: "Viola", 19: "Gertrúda", 20: "Bernard", 
            21: "Zina", 22: "Júlia / Juliána", 23: "Želmíra", 24: "Ela", 
            25: "Urban", 26: "Dušan", 27: "Iveta", 28: "Viliam", 
            29: "Vilma", 30: "Ferdinand", 31: "Petronela"
        };

        const slovenskeSviatky = {
            "1.1.": "Deň vzniku SR", "6.1.": "Traja králi", "1.5.": "Sviatok práce", "8.5.": "Deň víťazstva",
            "5.7.": "Cyril a Metod", "29.8.": "Výročie SNP", "1.9.": "Deň Ústavy SR", "15.9.": "Sedembolestná P. Mária",
            "1.11.": "Všetkých svätých", "17.11.": "Boj za slobodu", "24.12.": "Štedrý deň", "25.12.": "1. sviatok vianočný", "26.12.": "2. sviatok vianočný"
        };

        let aktuálneMeniny = "...";

        async function updateNameday() {
            const now = new Date();
            const den = now.getDate();
            const mesiac = now.getMonth() + 1;

            try {
                const response = await fetch('https://api.abalin.net/today?country=sk');
                const data = await response.json();
                aktuálneMeniny = data.data.namedays.sk; 
            } catch (e) {
                // Ak zlyhá internet/CORS, použijeme lokálny májový zoznam
                if (mesiac === 5) { aktuálneMeniny = meninyMaj[den] || "..."; }
                else { aktuálneMeniny = "Meniny"; }
            }
            document.getElementById('day-display').textContent = aktuálneMeniny;
        }
        updateNameday(); setInterval(updateNameday, 3600000);

        function updateClock() {
            const now = new Date();
            const d = now.getDate();
            const m = now.getMonth() + 1;
            const klic = `${d}.${m}.`;

            let h = String(now.getHours()).padStart(2, '0');
            let min = String(now.getMinutes()).padStart(2, '0');
            let h_display = (h[0] === '1') ? `<span class="red-digit">1</span>${h.substring(1)}` : h;
            
            // Update pre obe sekcie (Radio aj Šetrič)
            document.getElementById('h-part').innerHTML = h_display;
            document.getElementById('m-part').textContent = min;
            if(document.getElementById('h-part-radio')) {
                document.getElementById('h-part-radio').innerHTML = h_display;
                document.getElementById('m-part-radio').textContent = min;
            }

            document.getElementById('date-display').textContent = klic;
            document.getElementById('day-display').textContent = aktuálneMeniny;

            const holidayEl = document.getElementById('holiday-display');
            if (slovenskeSviatky[klic]) {
                holidayEl.textContent = slovenskeSviatky[klic];
                holidayEl.style.display = "block";
            } else {
                holidayEl.style.display = "none";
            }
            updateMoonPhase(now);
        }
        setInterval(updateClock, 1000); updateClock();

        function updateMoonPhase(date) {
            const lp = 2551443; const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const res = Math.floor(phase / (24 * 3600));
            let icon = res < 2 ? "fa-circle" : (res < 14 ? "fa-circle-half-stroke" : "fa-solid fa-circle");
            document.getElementById('moon-icon').className = `fas ${icon} ss-moon`;
        }

        async function updateWeather() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
                const d = await r.json();
                const rawTemp = d.current.temperature_2m;
                const tColor = getTempColor(rawTemp);

                document.getElementById('weather-temp-mini').textContent = Math.round(rawTemp) + '°C';
                document.getElementById('outdoor-temp').textContent = Math.round(rawTemp) + '°C';
                document.getElementById('outdoor-temp').style.color = tColor;
                document.getElementById('apparent-temp').textContent = Math.round(d.current.apparent_temperature) + '°';
                document.getElementById('outdoor-hum').textContent = Math.round(d.current.relative_humidity_2m) + '%';

                const mainIconEl = document.getElementById('weather-icon-main');
                mainIconEl.className = 'fas ' + (WEATHER_CODES[d.current.weather_code] || 'fa-cloud') + ' meteo-icon-large';
                mainIconEl.style.color = WEATHER_COLORS[d.current.weather_code] || '#aaa';

                for (let i = 0; i <= 1; i++) {
                    const code = d.daily.weather_code[i];
                    const max = d.daily.temperature_2m_max[i];
                    const min = Math.round(d.daily.temperature_2m_min[i]);
                    document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${Math.round(max)}°</span> <span style="color:#aaa; font-size:0.7em">/ ${min}°</span>`;
                    const iconEl = document.getElementById(`fc${i}-icon`);
                    iconEl.className = 'fas ' + (WEATHER_CODES[code] || 'fa-cloud') + ' mini-icon';
                    iconEl.style.color = WEATHER_COLORS[code] || '#aaa';
                }
            } catch (e) { console.log("Chyba počasia:", e); }
        }
        updateWeather(); setInterval(updateWeather, 600000);

        const audio = document.getElementById('audioPlayer');
        function playRadio(url, element, type) {
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
            audio.volume = VOLUME_MAP[type] || 1.0;
            audio.src = url; audio.play();
            element.classList.add('playing');
            resetIdleTimer();
        }
        function stopRadio() {
            audio.pause(); audio.src = "";
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
            resetIdleTimer();
        }

        let idleTimer;
        function resetIdleTimer() {
            document.body.classList.remove('screensaver-mode');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => document.body.classList.add('screensaver-mode'), 20000);
        }
        document.addEventListener('touchstart', resetIdleTimer);
        resetIdleTimer();
    </script>
</body>
</html>
