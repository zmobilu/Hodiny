<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Panel PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none; }

        /* --- ZÁKLADNÝ REŽIM (RÁDIO) --- */
        .clock-section { flex: 1.5; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            border-right: 1px solid #222; padding-top: 3vh; transition: all 0.5s ease-in-out; }
        
        #time { font-size: 26vw; line-height: 0.8; letter-spacing: -4px; margin-bottom: 2vh; display: flex; align-items: baseline; }
        .hours-part { font-weight: 500; color: #ffffff; } 
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 10px; } 
        .red-digit { color: #eb0028 !important; } 
        
        .weather-section { display: flex; align-items: center; gap: 15px; }
        #weather-temp { font-size: 8.5vw; font-weight: 300; } 
        #weather-icon { font-size: 8.5vw; color: #ffcc00; }

        /* Skryté prvky v rádio režime */
        .ss-only { display: none; }

        .buttons-section { flex: 1.1; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; background: #050505; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; padding: 5px; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 70px; }
        .rozhlas { background-color: #007bc4; } 
        .fun { background-color: #b53a65; }
        .rock { background-color: #222222; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 60px; }
        .white-logo { filter: brightness(0) invert(1); }
        .playing { border: 2px solid #fff !important; }

        /* --- REŽIM ŠETRIČA (METEOSTANICA) --- */
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .clock-section { 
            flex: 1; border: none; padding: 20px;
            display: grid; 
            grid-template-columns: 1.4fr 0.8fr; 
            grid-template-rows: 1fr 0.4fr;
            gap: 10px;
        }

        /* Hodiny vľavo hore */
        body.screensaver-mode #time { 
            grid-column: 1; grid-row: 1;
            font-size: 35vw; align-self: center; justify-self: center;
        }

        /* Dátum a mesiac vľavo dole */
        body.screensaver-mode #date-block { 
            grid-column: 1; grid-row: 2;
            display: flex; align-items: center; justify-content: center; gap: 30px;
            border-top: 1px solid #222; padding-top: 10px;
        }
        .ss-date { font-size: 10vw; font-weight: 300; color: #fff; }
        .ss-moon { font-size: 8vw; color: #ddd; }

        /* Pravý stĺpec s počasím */
        body.screensaver-mode #weather-sidebar { 
            grid-column: 2; grid-row: 1 / span 2;
            display: flex; flex-direction: column; justify-content: space-around;
            background: #080808; border-radius: 20px; padding: 15px; border: 1px solid #111;
        }

        .meteo-box { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .meteo-label { font-size: 2.5vw; text-transform: uppercase; color: #666; margin-bottom: 5px; letter-spacing: 1px; }
        .meteo-value { font-size: 8vw; font-weight: 300; }
        .meteo-sub { font-size: 4vw; color: #aaa; font-weight: 200; }
        .meteo-icon-large { font-size: 12vw; margin-bottom: 10px; }

        #indoor-label { color: #87CEEB; } /* Interiér modrý */
        #outdoor-label { color: #ffcc00; } /* Exteriér žltý */

        #spotify-links-container, .bt-mini-link { display: none !important; }
        body:not(.screensaver-mode) #spotify-links-container.active { display: block !important; }
    </style>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="clock-section">
        <!-- Hodiny -->
        <div id="time">
            <span id="h-part" class="hours-part">0</span>
            <span id="m-part" class="minutes-part">00</span>
        </div>

        <!-- REŽIM RÁDIO: Jednoduché počasie -->
        <div class="weather-section ss-hide" id="radio-weather">
            <i id="weather-icon-mini" class="fas fa-sun"></i>
            <span id="weather-temp-mini">--°C</span>
        </div>

        <!-- REŽIM ŠETRIČ: Dátum a mesiac -->
        <div id="date-block" class="ss-only">
            <span id="date-display" class="ss-date">2.5.</span>
            <i id="moon-icon" class="fas fa-moon ss-moon"></i>
        </div>

        <!-- REŽIM ŠETRIČ: Pravý panel meteostanice -->
        <div id="weather-sidebar" class="ss-only">
            <div class="meteo-box">
                <i id="weather-icon-main" class="fas fa-cloud-sun meteo-icon-large" style="color: #ffcc00;"></i>
                <div class="meteo-label">Predpoveď</div>
            </div>

            <div class="meteo-box">
                <div class="meteo-label" id="indoor-label">Vnútri (Shelly)</div>
                <div class="meteo-value" id="indoor-temp">--°C</div>
                <div class="meteo-sub" id="indoor-hum">--% vlhkosť</div>
            </div>

            <div class="meteo-box">
                <div class="meteo-label" id="outdoor-label">Vonku</div>
                <div class="meteo-value" id="outdoor-temp">--°C</div>
                <div class="meteo-sub" id="outdoor-hum">--% vlhkosť</div>
            </div>
        </div>
    </div>

    <div class="buttons-section">
        <button onclick="stopRadio()" class="btn vypni"><i class="fa-solid fa-power-off"></i></button>
        <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn rozhlas">
            <div style="display: flex; align-items: center; font-size: 38px; font-weight: 800;">SRo</div>
        </button>
        <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun">
            <img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg" alt="Fun">
        </button>
        <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock">
            <img src="https://radiorock.sk/logo.svg" alt="Rock" class="white-logo">
        </button>
        <button onclick="showSpotify()" class="btn spotify"><i class="fa-brands fa-spotify"></i></button>
    </div>

    <script>
    const audio = document.getElementById('audioPlayer');
    const buttons = document.querySelectorAll('.btn');
    const SHELLY_IP = '192.168.1.50'; // <--- TU DOPLŇ SVOJU IP

    function updateClock() {
        const now = new Date();
        let h = String(now.getHours()).padStart(2, '0');
        let m = String(now.getMinutes()).padStart(2, '0');
        
        document.getElementById('h-part').innerHTML = h.replace(/1/g, '<span class="red-digit">1</span>');
        document.getElementById('m-part').textContent = m;
        document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
        
        updateMoonPhase(now);
    }
    setInterval(updateClock, 1000); updateClock();

    function updateMoonPhase(date) {
        const lp = 2551443; 
        const new_moon = new Date(1970, 0, 7, 20, 35, 0);
        const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
        const res = Math.floor(phase / (24 * 3600));
        let icon = "fa-moon";
        if (res < 2) icon = "fa-circle"; // Nov
        else if (res < 7) icon = "fa-moon"; // Dorastajúci kosák
        else if (res < 10) icon = "fa-stopwatch-20"; // Prvá štvrť
        else if (res < 14) icon = "fa-circle-half-stroke"; 
        else if (res < 17) icon = "fa-solid fa-circle"; // Spln
        document.getElementById('moon-icon').className = `fas ${icon} ss-moon`;
    }

    async function updateWeather() {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Europe%2FBratislava`);
            const d = await r.json();
            const temp = Math.round(d.current.temperature_2m);
            const hum = Math.round(d.current.relative_humidity_2m);
            
            document.getElementById('weather-temp-mini').textContent = temp + '°C';
            document.getElementById('outdoor-temp').textContent = temp + '°C';
            document.getElementById('outdoor-hum').textContent = hum + '% vlhkosť';
            
            const codes = { 0: 'fa-sun', 1: 'fa-cloud-sun', 3: 'fa-cloud', 61: 'fa-cloud-rain', 95: 'fa-bolt' };
            const iconClass = 'fas ' + (codes[d.current.weather_code] || 'fa-cloud');
            document.getElementById('weather-icon-mini').className = iconClass;
            document.getElementById('weather-icon-main').className = iconClass + ' meteo-icon-large';
        } catch (e) {}
    }
    updateWeather(); setInterval(updateWeather, 1800000);

    async function updateIndoor() {
        try {
            const r = await fetch(`http://${SHELLY_IP}/rpc/HTSensor.GetStatus`);
            const d = await r.json();
            document.getElementById('indoor-temp').textContent = Math.round(d.tC) + '°C';
            document.getElementById('indoor-hum').textContent = Math.round(d.rh) + '% vlhkosť';
        } catch (e) { console.log("Shelly offline"); }
    }
    updateIndoor(); setInterval(updateIndoor, 300000);

    function playRadio(url, element, type) {
        buttons.forEach(btn => btn.classList.remove('playing'));
        audio.src = url; audio.play();
        element.classList.add('playing');
        resetIdleTimer();
    }

    function stopRadio() {
        audio.pause(); audio.src = "";
        buttons.forEach(btn => btn.classList.remove('playing'));
        resetIdleTimer();
    }

    let idleTimer;
    function resetIdleTimer() {
        document.body.classList.remove('screensaver-mode');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => document.body.classList.add('screensaver-mode'), 20000);
    }
    document.addEventListener('touchstart', resetIdleTimer);
    resetIdleTimer();
</script>
</body>
</html>
