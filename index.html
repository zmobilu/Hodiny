<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard Vertical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* --- HORNÁ SEKCIA (HODINY) --- */
        .top-section {
            flex: 0 0 35%; /* Menšie v rádio režime */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.6s ease-in-out;
            border-bottom: 1px solid #111;
        }

        #time { 
            font-size: 22vw; line-height: 0.8; letter-spacing: -2px; 
            display: flex; align-items: baseline; 
            transform: scaleY(1.1); transform-origin: center;
            transition: all 0.6s ease-in-out;
        }
        .hours-part { font-weight: 600; }
        .minutes-part { font-weight: 200; margin-left: 5px; }
        .red-digit { color: #eb0028 !important; }

        /* --- SPODNÁ SEKCIA (OBSAH) --- */
        .bottom-section {
            flex: 1;
            position: relative;
            transition: all 0.6s ease-in-out;
        }

        /* RÁDIO TLAČIDLÁ */
        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px; padding: 15px; height: 100%;
        }
        .btn {
            display: flex; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; 
            border-radius: 15px; font-size: 1.5rem; cursor: pointer;
        }
        .btn-power { background: #222; color: #eb0028; font-size: 2rem; }
        .btn-spotify { background: #198c47; }
        .playing { border: 2px solid #fff; }

        /* ŠETRIČ - POČASIE A INFO */
        .ss-container {
            display: none; height: 100%; width: 100%;
            flex-direction: column; justify-content: space-around;
            padding: 10px 20px;
        }

        .weather-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .temp-big { font-size: 12vw; font-weight: 300; }
        .weather-icon-big { font-size: 10vw; color: #ffcc00; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 10px; }
        .date-text { font-size: 5vw; font-weight: 300; }
        .nameday-text { font-size: 4vw; color: #98FB98; text-transform: uppercase; }

        .forecast-row { display: flex; justify-content: space-around; width: 100%; margin-top: 5px; }
        .fc-item { text-align: center; }
        .fc-temp { font-size: 4vw; }

        /* --- PREPNUTIE DO ŠETRIČA --- */
        body.screensaver-mode .top-section { flex: 0 0 55%; border-bottom: none; }
        body.screensaver-mode #time { font-size: 38vw; transform: scaleY(1.4); }
        body.screensaver-mode .radio-grid { display: none; }
        body.screensaver-mode .ss-container { display: flex; }

        .ss-hide { transition: opacity 0.3s; }
        body.screensaver-mode .ss-hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="top-section">
        <div id="time">
            <span id="h-part" class="hours-part">00</span>
            <span id="m-part" class="minutes-part">00</span>
        </div>
    </div>

    <div class="bottom-section">
        
        <div class="radio-grid" id="radioControls">
            <button onclick="stopRadio()" class="btn btn-power"><i class="fa-solid fa-power-off"></i></button>
            <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 0.4)" class="btn" style="background:#007bc4; font-weight:800;">SRo</button>
            <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 0.8)" class="btn" style="background:#fff;"><img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg" style="height:40%"></button>
            <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 0.6)" class="btn" style="background:#222;"><img src="https://radiorock.sk/logo.svg" style="height:40%; filter: invert(1);"></button>
            <button onclick="window.location.href='spotify:search'" class="btn btn-spotify"><i class="fa-brands fa-spotify"></i></button>
            <button onclick="updateWeather()" class="btn"><i class="fa-solid fa-sync"></i></button>
        </div>

        <div class="ss-container">
            <div class="weather-main">
                <span id="ss-temp" class="temp-big">--°</span>
                <i id="ss-icon" class="fas fa-sun weather-icon-big"></i>
                <div style="text-align: right;">
                    <div id="ss-hum" style="font-size: 5vw; color: #888;">--%</div>
                    <div id="ss-apparent" style="font-size: 4vw; color: #666;">--°</div>
                </div>
            </div>

            <div class="info-row">
                <span id="ss-date" class="date-text">--.--.</span>
                <span id="ss-nameday" class="nameday-text">---</span>
            </div>

            <div class="forecast-row">
                <div class="fc-item">
                    <div>Dnes</div>
                    <i id="fc0-icon" class="fas fa-cloud"></i>
                    <div id="fc0-temp" class="fc-temp">--/--</div>
                </div>
                <div class="fc-item">
                    <div>Zajtra</div>
                    <i id="fc1-icon" class="fas fa-cloud"></i>
                    <div id="fc1-temp" class="fc-temp">--/--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURÁCIA A STAVY ---
        const audio = document.getElementById('audioPlayer');
        let dnesneMeno = "";
        const WEATHER_ICONS = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };

        function getTempColor(t) {
            if (t < 0) return '#00bfff';
            if (t < 15) return '#87CEEB';
            if (t < 25) return '#98FB98';
            return '#ffa500';
        }

        // --- HODINY A INFO ---
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('h-part').innerHTML = (h[0] === '1') ? `<span class="red-digit">1</span>${h[1]}` : h;
            document.getElementById('m-part').textContent = m;
            
            const dStr = `${now.getDate()}.${now.getMonth() + 1}.`;
            document.getElementById('ss-date').textContent = dStr;
            document.getElementById('ss-nameday').textContent = dnesneMeno;
        }

        async function updateNameday() {
            try {
                const r = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await r.text();
                const now = new Date();
                const target = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const lines = text.split('\n');
                for (let line of lines) {
                    if (line.includes(target)) {
                        dnesneMeno = line.split(/[;,]/).pop().trim();
                        break;
                    }
                }
            } catch (e) {}
        }

        async function updateWeather() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
                const d = await r.json();
                
                const t = Math.round(d.current.temperature_2m);
                const tEl = document.getElementById('ss-temp');
                tEl.textContent = t + '°';
                tEl.style.color = getTempColor(t);
                
                document.getElementById('ss-hum').textContent = Math.round(d.current.relative_humidity_2m) + '%';
                document.getElementById('ss-apparent').textContent = 'Pocitovo ' + Math.round(d.current.apparent_temperature) + '°';
                
                const code = d.current.weather_code;
                document.getElementById('ss-icon').className = `fas ${WEATHER_ICONS[code] || 'fa-cloud'} weather-icon-big`;

                for (let i = 0; i <= 1; i++) {
                    const max = Math.round(d.daily.temperature_2m_max[i]);
                    const min = Math.round(d.daily.temperature_2m_min[i]);
                    document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${max}°</span> / ${min}°`;
                    document.getElementById(`fc${i}-icon`).className = `fas ${WEATHER_ICONS[d.daily.weather_code[i]] || 'fa-cloud'}`;
                }
            } catch (e) {}
        }

        // --- RÁDIO LOGIKA ---
        function playRadio(url, btn, vol) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
            audio.src = url;
            audio.volume = vol;
            audio.play();
            btn.classList.add('playing');
            resetIdleTimer();
        }

        function stopRadio() {
            audio.pause();
            audio.src = "";
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
            resetIdleTimer();
        }

        // --- ČASOVAČ ŠETRIČA ---
        let idleTimer;
        function resetIdleTimer() {
            document.body.classList.remove('screensaver-mode');
            clearTimeout(idleTimer);
            // Šetrič naskočí po 20 sekundách nečinnosti
            idleTimer = setTimeout(() => {
                document.body.classList.add('screensaver-mode');
            }, 20000);
        }

        document.addEventListener('touchstart', resetIdleTimer);
        document.addEventListener('mousedown', resetIdleTimer);

        // Štart
        updateNameday();
        updateClock();
        updateWeather();
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000);
        resetIdleTimer();

    </script>
</body>
</html>
